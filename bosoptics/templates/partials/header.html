{% load static %}
<header id="site-header">
    <div class="header-inner container">
        <a href="{% url 'core:home' %}" class="logo-link">
            <img class="logo" src="{% static 'core/images/logo.png' %}" alt="BOS Optics">
        </a>

        <button class="mobile-menu-btn" aria-label="Toggle menu" type="button">
            <span></span><span></span><span></span>
        </button>

        <nav class="navigation">
            <a href="{% url 'core:home' %}">Home</a>
            <a href="{% url 'core:home' %}#categories">Categories</a>
            <a href="{% url 'products:list' %}">Shop</a>
            <a href="{% url 'core:home' %}#why-us">Why Us</a>
            <a href="{% url 'core:home' %}#services">Services</a>
            <a href="{% url 'blog:list' %}">Blog</a>
            <a href="{% url 'services:book' %}">Book Exam</a>
            <a href="{% url 'core:home' %}#contact">Contact</a>
        </nav>

        <div class="header-actions">
            <a href="{% url 'products:list' %}" class="header-icon-btn" aria-label="Search products">
                <img src="{% static 'core/images/search-icon.png' %}" alt="">
            </a>
            <a href="{% url 'products:cart' %}" class="header-icon-btn cart-btn" aria-label="Cart">
                <img src="{% static 'core/images/cart.png' %}" alt="">
                {% if cart_count %}<span class="cart-count">{{ cart_count }}</span>{% endif %}
            </a>
            {% if user.is_authenticated %}
            <div class="user-menu">
                <a href="{% url 'core:profile' %}" class="btn-ghost-sm">My Account</a>
                <a href="{% url 'core:logout' %}" class="btn-gold-sm">Logout</a>
            </div>
            {% else %}
            <a href="{% url 'core:login' %}" class="btn-ghost-sm">Login</a>
            <a href="{% url 'core:register' %}" class="btn-gold-sm">Register</a>
            {% endif %}
        </div>
    </div>
</header>
